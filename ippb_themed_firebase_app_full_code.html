<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPPB Dashboard</title>
  <style>
    :root {
      --primary: #7a0019; /* India Post red */
      --secondary: #ffcc00; /* India Post yellow */
      --bg-light: #f5f6fa;
      --bg-dark: #121212;
      --text-light: #ffffff;
      --text-dark: #1e1e1e;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      transition: 0.3s;
    }

    body.dark {
      background: var(--bg-dark);
      color: var(--text-light);
    }

    header {
      background: var(--primary);
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: var(--secondary);
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    input, select {
      padding: 8px;
      margin: 6px 0;
      width: 100%;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    body.dark .card {
      background: #1e1e1e;
    }

  </style>
</head>
<body>

<header>
  <h3>IPPB Dashboard</h3>
  <button onclick="toggleTheme()">Toggle Theme</button>
</header>

<div class="container">

  <div id="auth">
    <h3>Login / Signup</h3>
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <select id="role">
      <option value="admin">Admin</option>
      <option value="vendor">Vendor</option>
    </select>
    <button onclick="signup()">Signup</button>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red"></p>
  </div>

  <div id="app" style="display:none">
    <h3>Welcome <span id="userEmail"></span></h3>
    <button onclick="logout()">Logout</button>

    <h4>Add Record</h4>
    <input id="title" placeholder="Title" />
    <button onclick="addData()">Save</button>

    <div id="dataList"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async () => {
  const email = emailEl.value;
  const password = passwordEl.value;
  const role = roleEl.value;

  try {
    const res = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", res.user.uid), {
      email,
      role
    });

    alert("Signup successful");
  } catch (e) {
    errorEl.innerText = e.message;
  }
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, emailEl.value, passwordEl.value);
  } catch (e) {
    errorEl.innerText = e.message;
  }
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    const docSnap = await getDoc(doc(db, "users", user.uid));
    const data = docSnap.data();

    if (data.role !== roleEl.value) {
      errorEl.innerText = "Role mismatch";
      await signOut(auth);
      return;
    }

    authDiv.style.display = "none";
    appDiv.style.display = "block";
    userEmail.innerText = user.email;

    loadData();
  } else {
    authDiv.style.display = "block";
    appDiv.style.display = "none";
  }
});

window.logout = () => signOut(auth);

window.addData = async () => {
  await addDoc(collection(db, "records"), {
    title: titleEl.value,
    createdAt: new Date()
  });
  loadData();
};

async function loadData() {
  const snap = await getDocs(collection(db, "records"));
  dataList.innerHTML = "";

  snap.forEach(doc => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = doc.data().title;
    dataList.appendChild(div);
  });
}

window.toggleTheme = () => {
  document.body.classList.toggle("dark");
};

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const roleEl = document.getElementById("role");
const errorEl = document.getElementById("error");
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const titleEl = document.getElementById("title");
const dataList = document.getElementById("dataList");

</script>

</body>
</html>
